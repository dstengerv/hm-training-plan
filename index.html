<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icon.png">
<title>HM / Plan</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0c0f0a;
  --surface: #13160f;
  --surface2: #1a1e15;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --text: #e8ead4;
  --text2: #8a8f78;
  --text3: #4a4e3e;
  --green: #a8cc5a;
  --green-dim: #6a8a2a;
  --green-bg: rgba(168,204,90,0.09);
  --blue: #5ab4cc;
  --blue-dim: #2a6a8a;
  --blue-bg: rgba(90,180,204,0.09);
  --amber: #ccaa5a;
  --amber-bg: rgba(204,170,90,0.09);
  --red: #cc5a5a;
  --red-bg: rgba(204,90,90,0.09);
  --mono: 'DM Mono', monospace;
  --sans: 'Syne', sans-serif;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { background: var(--bg); }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 15px;
  line-height: 1.5;
  min-height: 100dvh;
  -webkit-tap-highlight-color: transparent;
}

/* ── TOPBAR ── */
.topbar {
  position: sticky; top: 0; z-index: 100;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: calc(var(--safe-top) + 12px) 18px 12px;
  display: flex; align-items: center; justify-content: space-between;
}
.logo { font-family: var(--mono); font-size: 14px; font-weight: 500; color: var(--green); letter-spacing: 0.08em; }
.logo span { color: var(--text3); }
.topbar-right { display: flex; align-items: center; gap: 10px; }
.race-chip {
  display: flex; align-items: center; gap: 5px;
  background: var(--red-bg); border: 1px solid rgba(204,90,90,0.2);
  border-radius: 20px; padding: 4px 10px;
  font-family: var(--mono); font-size: 11px; color: var(--red);
}
.race-chip-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--red); animation: blink 2s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

/* ── WEEK PICKER DRAWER ── */
.drawer-toggle {
  width: 100%;
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 18px;
  background: var(--surface2);
  border: none; border-bottom: 1px solid var(--border);
  cursor: pointer; color: var(--text);
  -webkit-tap-highlight-color: transparent;
}
.drawer-toggle-left { display: flex; align-items: center; gap: 10px; }
.drawer-current-label { font-size: 14px; font-weight: 600; color: var(--text); }
.drawer-current-sub { font-family: var(--mono); font-size: 11px; color: var(--text3); margin-top: 1px; }
.drawer-arrow {
  font-size: 12px; color: var(--text3);
  transition: transform 0.25s ease;
}
.drawer-arrow.open { transform: rotate(180deg); }

.drawer {
  max-height: 0; overflow: hidden;
  transition: max-height 0.3s ease;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}
.drawer.open { max-height: 600px; }

.week-list { padding: 6px 0; }
.week-row {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 18px;
  border: none; background: none;
  width: 100%; text-align: left; cursor: pointer;
  border-left: 3px solid transparent;
  transition: background 0.12s;
  -webkit-tap-highlight-color: transparent;
}
.week-row:active { background: var(--surface2); }
.week-row.active {
  background: var(--green-bg);
  border-left-color: var(--green);
}
.week-row.active.taper { background: var(--amber-bg); border-left-color: var(--amber); }
.week-row.active.race-wk { background: var(--red-bg); border-left-color: var(--red); }
.wr-num { font-family: var(--mono); font-size: 12px; color: var(--text3); min-width: 26px; }
.week-row.active .wr-num { color: var(--green); }
.week-row.active.taper .wr-num { color: var(--amber); }
.week-row.active.race-wk .wr-num { color: var(--red); }
.wr-info { flex: 1; }
.wr-title { font-size: 14px; font-weight: 500; color: var(--text2); }
.week-row.active .wr-title { color: var(--text); }
.wr-dates { font-family: var(--mono); font-size: 11px; color: var(--text3); margin-top: 1px; }
.wr-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
.now-pill {
  font-family: var(--mono); font-size: 9px; color: var(--red);
  background: var(--red-bg); border: 1px solid rgba(204,90,90,0.2);
  border-radius: 3px; padding: 1px 5px; letter-spacing: 0.05em;
}
.wr-dots { display: flex; gap: 3px; }
.wdot { width: 6px; height: 6px; border-radius: 50%; background: var(--surface2); }
.wdot.done { background: var(--green); }

/* ── PROGRESS BAR ── */
.prog-bar-wrap {
  padding: 10px 18px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px;
}
.prog-label { font-family: var(--mono); font-size: 11px; color: var(--text3); white-space: nowrap; }
.prog-track { flex: 1; height: 3px; background: var(--surface2); border-radius: 2px; overflow: hidden; }
.prog-fill { height: 100%; background: var(--green); border-radius: 2px; transition: width 0.4s; }
.prog-pct { font-family: var(--mono); font-size: 11px; color: var(--green); min-width: 30px; text-align: right; }

/* ── MAIN ── */
.main { padding: 20px 18px calc(var(--safe-bottom) + 32px); }

.week-header { margin-bottom: 20px; }
.week-eyebrow {
  display: flex; align-items: center; gap: 8px;
  font-family: var(--mono); font-size: 11px; color: var(--text3);
  letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px;
}
.phase-tag {
  font-family: var(--mono); font-size: 10px; font-weight: 500;
  padding: 2px 8px; border-radius: 3px; letter-spacing: 0.05em;
}
.pt-build { background: var(--blue-bg); color: var(--blue); border: 1px solid rgba(90,180,204,0.15); }
.pt-peak  { background: var(--green-bg); color: var(--green); border: 1px solid rgba(168,204,90,0.15); }
.pt-taper { background: var(--amber-bg); color: var(--amber); border: 1px solid rgba(204,170,90,0.15); }
.pt-race  { background: var(--red-bg); color: var(--red); border: 1px solid rgba(204,90,90,0.15); }

.week-title { font-size: 26px; font-weight: 700; color: var(--text); line-height: 1.1; margin-bottom: 4px; }
.week-subtitle { font-size: 13px; color: var(--text2); }

/* Stats strip */
.stats-strip { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
.stat {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; padding: 14px 14px;
}
.stat-label { font-family: var(--mono); font-size: 10px; color: var(--text3); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 5px; }
.stat-value { font-size: 20px; font-weight: 700; color: var(--text); line-height: 1.1; }
.stat-unit { font-size: 12px; font-weight: 400; color: var(--text2); }
.stat-sub { font-family: var(--mono); font-size: 10px; color: var(--text3); margin-top: 3px; }

/* ── UNIFIED RUN CARDS ── */
.days-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }

/* Rest / cross cards — simple, no interaction */
.day-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px;
}
.day-card-inner {
  display: flex; align-items: center; gap: 12px; padding: 13px 16px;
}
.day-name { font-family: var(--mono); font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; min-width: 30px; }
.day-rest-label { font-size: 13px; color: var(--text3); }

/* Run cards — tappable, expandable */
.run-card {
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: 12px; overflow: hidden;
  transition: border-color 0.2s;
}
.run-card.done { border-color: rgba(168,204,90,0.3); background: var(--green-bg); }
.run-card.done.goal-type { border-color: rgba(90,180,204,0.25); background: var(--blue-bg); }
.run-card.done.race-type { border-color: rgba(204,90,90,0.3); background: var(--red-bg); }

/* Card header row — always visible, tap to expand */
.run-card-header {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 16px; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}

.rc-check {
  width: 24px; height: 24px; border-radius: 7px; flex-shrink: 0;
  border: 1.5px solid var(--border2);
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s; background: transparent;
}
.run-card.done .rc-check { background: var(--green); border-color: var(--green); }
.rc-tick { font-size: 13px; color: var(--bg); display: none; font-weight: 700; }
.run-card.done .rc-tick { display: block; }

.rc-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
}
.rc-dot.easy { background: var(--green); }
.rc-dot.goal { background: var(--blue); }
.rc-dot.race { background: var(--red); }

.rc-info { flex: 1; min-width: 0; }
.rc-day { font-family: var(--mono); font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 2px; }
.rc-name { font-size: 15px; font-weight: 600; color: var(--text); }
.run-card.done .rc-name { color: var(--text2); }
.rc-segs { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 3px; }
.rc-seg { font-size: 11px; }
.rc-seg .s-easy { color: var(--green); font-weight: 500; }
.rc-seg .s-goal { color: var(--blue); font-weight: 500; }

.rc-right { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; flex-shrink: 0; }
.rc-dist { font-size: 22px; font-weight: 700; line-height: 1; }
.rc-dist.easy { color: var(--green); }
.rc-dist.goal { color: var(--blue); }
.rc-dist.race { color: var(--red); }
.rc-dist-unit { font-size: 11px; font-weight: 400; color: var(--text2); }
.rc-saved-time { font-family: var(--mono); font-size: 11px; color: var(--text3); }
.run-card.done .rc-saved-time { color: var(--green); }
.rc-expand-icon { font-size: 11px; color: var(--text3); transition: transform 0.2s; }
.run-card.expanded .rc-expand-icon { transform: rotate(180deg); }

/* Expandable log section */
.rc-log {
  max-height: 0; overflow: hidden;
  transition: max-height 0.25s ease;
  border-top: 0px solid var(--border);
}
.run-card.expanded .rc-log {
  max-height: 160px;
  border-top: 1px solid var(--border);
}
.rc-log-inner {
  padding: 14px 16px;
  display: flex; flex-direction: column; gap: 10px;
}
.rc-log-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.rc-time-input {
  font-family: var(--mono); font-size: 16px;
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 8px; color: var(--text);
  padding: 9px 13px; width: 130px; outline: none;
  -webkit-appearance: none;
  transition: border-color 0.15s;
}
.rc-time-input:focus { border-color: var(--green); }
.rc-time-input::placeholder { color: var(--text3); font-size: 14px; }
.rc-save-btn {
  font-family: var(--sans); font-size: 14px; font-weight: 600;
  background: var(--green); border: none;
  border-radius: 8px; color: var(--bg);
  padding: 9px 18px; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: opacity 0.12s;
}
.rc-save-btn:active { opacity: 0.75; }
.rc-pace { font-family: var(--mono); font-size: 13px; color: var(--blue); }
.rc-log-hint { font-size: 12px; color: var(--text3); }

/* Tip box */
.tip-box {
  background: var(--surface); border: 1px solid var(--border);
  border-left: 3px solid var(--green);
  border-radius: 10px; padding: 14px 16px;
  margin-bottom: 20px;
}
.tip-box.taper { border-left-color: var(--amber); }
.tip-box.race  { border-left-color: var(--red); }
.tip-label { font-family: var(--mono); font-size: 10px; color: var(--text3); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 5px; }
.tip-text { font-size: 13px; color: var(--text2); line-height: 1.65; }



::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-thumb { background: var(--surface2); }
</style>
</head>
<body>

<!-- TOPBAR -->
<header class="topbar">
  <div class="logo">HM<span>/</span>Plan</div>
  <div class="topbar-right">
    <div class="race-chip">
      <div class="race-chip-dot"></div>
      July 18 · <span id="days-top" style="font-weight:500">--</span>d
    </div>
    <div style="font-family:var(--mono);font-size:11px;color:var(--text3)">→ <span style="color:var(--green)">1:50</span></div>
  </div>
</header>

<!-- DRAWER TOGGLE -->
<button class="drawer-toggle" onclick="toggleDrawer()" id="drawer-toggle">
  <div class="drawer-toggle-left">
    <div>
      <div class="drawer-current-label" id="drawer-label">Week 1 — Base building</div>
      <div class="drawer-current-sub" id="drawer-sub">May 18–24</div>
    </div>
  </div>
  <span class="drawer-arrow" id="drawer-arrow">▼</span>
</button>

<!-- DRAWER -->
<div class="drawer" id="drawer">
  <div class="week-list" id="week-list"></div>
</div>

<!-- PROGRESS -->
<div class="prog-bar-wrap">
  <span class="prog-label" id="prog-label">Week 1 of 8</span>
  <div class="prog-track"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
  <span class="prog-pct" id="prog-pct">0%</span>
</div>

<!-- MAIN -->
<main class="main" id="main"></main>

<script>
const DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

const REST  = { type:'rest',  label:'Rest',  note:'General stretching' };
const CROSS = { type:'cross', label:'Cross-train', note:'Active recovery' };

const weeks = [
  {
    n:1, phase:'build', label:'Base building', dates:'May 18–24',
    tip:'All runs at easy, conversational pace. You should be able to hold a full sentence throughout. Getting out consistently matters more than pace right now.',
    days:[ REST,
      { type:'easy', dist:'3', unit:'K', label:'Easy run', note:'General stretching' }, REST,
      { type:'easy', dist:'4', unit:'K', label:'Easy run', note:'General stretching' }, REST,
      { type:'easy', dist:'7', unit:'K', label:'Long run', note:'Slow & steady' }, CROSS ]
  },
  {
    n:2, phase:'build', label:'Building mileage', dates:'May 25–31',
    tip:'Keep all runs easy. Saturday long run is your key session — resist the urge to push the pace.',
    days:[ REST,
      { type:'easy', dist:'4', unit:'K', label:'Easy run', note:'General stretching' }, REST,
      { type:'easy', dist:'5', unit:'K', label:'Easy run', note:'General stretching' }, REST,
      { type:'easy', dist:'9', unit:'K', label:'Long run', note:'Slow & steady' }, CROSS ]
  },
  {
    n:3, phase:'build', label:'Introduce goal pace', dates:'Jun 1–7',
    tip:'First structured Thursday with goal-pace block. This is your target 1:50 pace — about 5:13/km. Steady effort, short sentences only.',
    days:[ REST,
      { type:'easy', dist:'4', unit:'K', label:'Easy run', note:'General stretching' }, REST,
      { type:'goal', label:'Structured run', segments:[
        { label:'2km', pace:'Easy', cls:'s-easy' },
        { label:'4km', pace:'Goal half pace', cls:'s-goal' },
        { label:'2km', pace:'Easy', cls:'s-easy' }] }, REST,
      { type:'easy', dist:'10', unit:'K', label:'Long run', note:'Easy throughout' }, CROSS ]
  },
  {
    n:4, phase:'build', label:'Recovery week', dates:'Jun 8–14',
    tip:'Planned down week — volume drops ~20%. Your body adapts during recovery, not the runs themselves. Do not skip this.',
    days:[ REST,
      { type:'easy', dist:'4', unit:'K', label:'Easy run', note:'General stretching' }, REST,
      { type:'easy', dist:'6', unit:'K', label:'Easy run', note:'General stretching' }, REST,
      { type:'easy', dist:'8', unit:'K', label:'Long run', note:'Easy, no pressure' }, CROSS ]
  },
  {
    n:5, phase:'peak', label:'Peak build', dates:'Jun 15–21',
    tip:'Bigger goal-pace block on Thursday. Saturday steps up to 12K — your stepping stone before the peak long run.',
    days:[ REST,
      { type:'easy', dist:'5', unit:'K', label:'Easy run', note:'General stretching' }, REST,
      { type:'goal', label:'Structured run', segments:[
        { label:'2km', pace:'Easy', cls:'s-easy' },
        { label:'6km', pace:'Goal half pace', cls:'s-goal' },
        { label:'2km', pace:'Easy', cls:'s-easy' }] }, REST,
      { type:'easy', dist:'12', unit:'K', label:'Long run', note:'Easy pace throughout' }, CROSS ]
  },
  {
    n:6, phase:'peak', label:'Peak week', dates:'Jun 22–28',
    tip:'Your biggest week. The 16K long run is your confidence builder — treat the middle 8km at comfortable-steady effort.',
    days:[ REST,
      { type:'easy', dist:'5', unit:'K', label:'Easy run', note:'General stretching' }, REST,
      { type:'goal', label:'Structured run', segments:[
        { label:'2km', pace:'Easy', cls:'s-easy' },
        { label:'7km', pace:'Goal half pace', cls:'s-goal' },
        { label:'2km', pace:'Easy', cls:'s-easy' }] }, REST,
      { type:'easy', dist:'16', unit:'K', label:'Long run', note:'Biggest run of the plan' }, CROSS ]
  },
  {
    n:7, phase:'taper', label:'Taper', dates:'Jun 29–Jul 12',
    tip:'Volume drops sharply — intentional. You may feel restless or sluggish. That is the taper working. Trust your training.',
    days:[ REST,
      { type:'easy', dist:'4', unit:'K', label:'Easy run', note:'General stretching' }, REST,
      { type:'goal', label:'Structured run', segments:[
        { label:'2km', pace:'Easy', cls:'s-easy' },
        { label:'4km', pace:'Goal half pace', cls:'s-goal' },
        { label:'2km', pace:'Easy', cls:'s-easy' }] }, REST,
      { type:'easy', dist:'10', unit:'K', label:'Long run', note:'Comfortable, keep it easy' }, CROSS ]
  },
  {
    n:8, phase:'race', label:'Race week', dates:'Jul 13–18',
    tip:'Short and easy all week. Sleep well, eat familiar foods, stay off your feet Friday. Start conservative on race day — build through the middle, empty the tank at 18K.',
    days:[ REST,
      { type:'easy', dist:'4', unit:'K', label:'Easy run', note:'General stretching' }, REST,
      { type:'easy', dist:'3', unit:'K', label:'Shakeout', note:'Easy + 4×20s strides' }, REST,
      { type:'race', dist:'21.1', unit:'K', label:'Race day 🏁', note:'Target: 1:50:00' }, CROSS ]
  }
];

const wkStarts = [
  '2026-05-18','2026-05-25','2026-06-01','2026-06-08',
  '2026-06-15','2026-06-22','2026-06-29','2026-07-13'
].map(d => new Date(d));
const raceDay = new Date('2026-07-18');

let activeWeek = 1;
let drawerOpen = false;
const today = new Date();
for (let i = wkStarts.length - 1; i >= 0; i--) {
  if (today >= wkStarts[i]) { activeWeek = i + 1; break; }
}

// Storage
function getChecked(w, d) { return localStorage.getItem(`hm-w${w}-d${d}`) === '1'; }
function toggleChecked(w, d) {
  const k = `hm-w${w}-d${d}`;
  localStorage.setItem(k, localStorage.getItem(k) === '1' ? '0' : '1');
}
function getTime(w, d) { return localStorage.getItem(`hm-w${w}-d${d}-time`) || ''; }
function saveTime(w, d, v) { localStorage.setItem(`hm-w${w}-d${d}-time`, v); }
function getPace(timeStr, distStr) {
  const p = timeStr.split(':');
  if (p.length < 2) return '';
  const mins = parseInt(p[0]||0)*60 + parseInt(p[1]||0) + (p[2] ? parseInt(p[2]||0)/60 : 0);
  const dist = parseFloat(distStr);
  if (!dist || !mins) return '';
  const pm = mins / dist;
  const m = Math.floor(pm), s = Math.round((pm-m)*60);
  return `${m}:${String(s).padStart(2,'0')}/km`;
}

function getRunDays(week) {
  return week.days.map((d,i) => ({...d,dayIdx:i})).filter(d => d.type!=='rest' && d.type!=='cross');
}
function getWeekKm(week) {
  let t = 0;
  week.days.forEach(d => {
    if (d.segments) d.segments.forEach(s => { t += parseFloat(s.label)||0; });
    else if (d.dist && d.type!=='rest' && d.type!=='cross') t += parseFloat(d.dist)||0;
  });
  return t;
}

function toggleDrawer() {
  drawerOpen = !drawerOpen;
  document.getElementById('drawer').classList.toggle('open', drawerOpen);
  document.getElementById('drawer-arrow').classList.toggle('open', drawerOpen);
}

function closeDrawer() {
  drawerOpen = false;
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawer-arrow').classList.remove('open');
}

function renderTopbar() {
  const diff = Math.ceil((raceDay - new Date()) / (1000*60*60*24));
  document.getElementById('days-top').textContent = diff > 0 ? diff : '🏁';
}

function renderProgress() {
  const pct = Math.round((activeWeek/8)*100);
  document.getElementById('prog-fill').style.width = pct+'%';
  document.getElementById('prog-label').textContent = `Week ${activeWeek} of 8`;
  document.getElementById('prog-pct').textContent = pct+'%';
}

function renderDrawerToggle() {
  const w = weeks[activeWeek-1];
  document.getElementById('drawer-label').textContent = `Week ${w.n} — ${w.label}`;
  document.getElementById('drawer-sub').textContent = w.dates;
}

function renderWeekList() {
  const phaseClass = { build:'', peak:'', taper:'taper', race:'race-wk' };
  document.getElementById('week-list').innerHTML = weeks.map(w => {
    const runs = getRunDays(w);
    const dots = runs.map(r => `<div class="wdot ${getChecked(w.n,r.dayIdx)?'done':''}"></div>`).join('');
    const isCurrent = today >= wkStarts[w.n-1] && (w.n===8 || today < wkStarts[w.n]);
    return `<button class="week-row ${activeWeek===w.n?'active':''} ${phaseClass[w.phase]||''}" onclick="setWeek(${w.n})">
      <div class="wr-num">${w.n===8?'🏁':String(w.n).padStart(2,'0')}</div>
      <div class="wr-info">
        <div class="wr-title">${w.label}</div>
        <div class="wr-dates">${w.dates}</div>
      </div>
      <div class="wr-right">
        ${isCurrent?'<span class="now-pill">NOW</span>':''}
        <div class="wr-dots">${dots}</div>
      </div>
    </button>`;
  }).join('');
}

function renderMain() {
  const w = weeks[activeWeek-1];
  const km = getWeekKm(w);
  const runs = getRunDays(w);
  const checked = runs.filter(r => getChecked(w.n,r.dayIdx)).length;
  const daysLeft = Math.ceil((raceDay - wkStarts[activeWeek-1]) / (1000*60*60*24));
  const daysDisplay = daysLeft > 0 ? daysLeft : '🏁';
  const phaseTagClass = { build:'pt-build', peak:'pt-peak', taper:'pt-taper', race:'pt-race' };
  const phaseLabel = { build:'Base build', peak:'Peak', taper:'Taper', race:'Race week' };
  const tipCls = w.phase==='taper'?'taper':w.phase==='race'?'race':'';

  // Unified day cards — run days get checkbox + expandable time logger
  const dayCards = w.days.map((d, i) => {
    const name = DAYS[i];

    // Rest or cross-train — simple non-interactive row
    if (d.type === 'rest' || d.type === 'cross') {
      const icon = d.type === 'cross' ? '🚴' : '—';
      const lbl = d.type === 'cross' ? 'Cross-train · Active recovery' : 'Rest · Stretching';
      return `<div class="day-card">
        <div class="day-card-inner">
          <span class="day-name">${name}</span>
          <span style="font-size:15px;color:var(--text3)">${icon}</span>
          <span class="day-rest-label">${lbl}</span>
        </div>
      </div>`;
    }

    // Run day
    const isDone = getChecked(w.n, i);
    const distNum = d.segments ? String(d.segments.reduce((a,s)=>a+(parseFloat(s.label)||0),0)) : d.dist;
    const savedTime = getTime(w.n, i);
    const pace = savedTime ? getPace(savedTime, distNum) : '';
    const dc = d.type==='race'?'race':d.type==='goal'?'goal':'easy';
    const doneCls = isDone ? (d.type==='goal'?'done goal-type':d.type==='race'?'done race-type':'done') : '';

    const segsHTML = d.segments
      ? `<div class="rc-segs">${d.segments.map(s=>`<span class="rc-seg"><span class="${s.cls}">${s.label}</span> ${s.pace.replace('Goal half pace','goal pace')}</span>`).join('')}</div>`
      : (d.note ? `<div style="font-size:12px;color:var(--text2);margin-top:2px">${d.note}</div>` : '');

    const timeDisplay = savedTime
      ? `<span class="rc-saved-time">${savedTime}</span>`
      : `<span class="rc-expand-icon">▼</span>`;

    return `<div class="run-card ${doneCls}" id="rc-${i}">
      <div class="run-card-header" onclick="toggleExpand(${i})">
        <div class="rc-check" onclick="event.stopPropagation();toggleRun(${i})">
          <span class="rc-tick">✓</span>
        </div>
        <div class="rc-dot ${dc}"></div>
        <div class="rc-info">
          <div class="rc-day">${name}</div>
          <div class="rc-name">${d.label}</div>
          ${segsHTML}
        </div>
        <div class="rc-right">
          <div class="rc-dist ${dc}">${distNum}<span class="rc-dist-unit">K</span></div>
          ${timeDisplay}
        </div>
      </div>
      <div class="rc-log" id="rclog-${i}">
        <div class="rc-log-inner">
          <div class="rc-log-hint">Log your time — pace calculates automatically</div>
          <div class="rc-log-row">
            <input class="rc-time-input" type="text" inputmode="decimal" placeholder="0:00:00"
              value="${savedTime}" id="rct-${i}"
              oninput="previewPace(${w.n},${i},'${distNum}')"
              onkeydown="if(event.key==='Enter'){this.blur();saveRunTime(${w.n},${i},'${distNum}')}">
            <button class="rc-save-btn" onclick="saveRunTime(${w.n},${i},'${distNum}')">Save</button>
            <span class="rc-pace" id="pace-${i}">${pace}</span>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('main').innerHTML = `
    <div class="week-header">
      <div class="week-eyebrow">Week ${w.n} of 8 <span class="phase-tag ${phaseTagClass[w.phase]}">${phaseLabel[w.phase]}</span></div>
      <div class="week-title">${w.label}</div>
      <div class="week-subtitle">${w.dates} · ${checked}/${runs.length} runs done</div>
    </div>

    <div class="stats-strip">
      <div class="stat">
        <div class="stat-label">Volume</div>
        <div class="stat-value">${km}<span class="stat-unit">km</span></div>
        <div class="stat-sub">this week</div>
      </div>
      <div class="stat">
        <div class="stat-label">Days to race</div>
        <div class="stat-value">${daysDisplay}</div>
        <div class="stat-sub">Jul 18, 2026</div>
      </div>
      <div class="stat">
        <div class="stat-label">Goal pace</div>
        <div class="stat-value">5:13<span class="stat-unit">/km</span></div>
        <div class="stat-sub">8:23 min/mi</div>
      </div>
      <div class="stat">
        <div class="stat-label">Runs done</div>
        <div class="stat-value">${checked}<span class="stat-unit">/${runs.length}</span></div>
        <div class="stat-sub">this week</div>
      </div>
    </div>

    <div class="days-list">${dayCards}</div>

    <div class="tip-box ${tipCls}">
      <div class="tip-label">Coach's note</div>
      <div class="tip-text">${w.tip}</div>
    </div>

    <div class="nav-arrows">
      <button class="nav-btn" onclick="setWeek(${activeWeek-1})" ${activeWeek===1?'disabled':''}>← Prev week</button>
      <button class="nav-btn" onclick="setWeek(${activeWeek+1})" ${activeWeek===8?'disabled':''}>Next week →</button>
    </div>
  `;
}

function toggleExpand(dayIdx) {
  const card = document.getElementById(`rc-${dayIdx}`);
  const log  = document.getElementById(`rclog-${dayIdx}`);
  if (!card || !log) return;
  const isOpen = card.classList.contains('expanded');
  // close all others first
  document.querySelectorAll('.run-card.expanded').forEach(c => c.classList.remove('expanded'));
  if (!isOpen) card.classList.add('expanded');
}

function toggleRun(dayIdx) {
  toggleChecked(activeWeek, dayIdx);
  renderWeekList();
  renderMain();
}

function saveRunTime(week, day, dist) {
  const input = document.getElementById(`rct-${day}`);
  if (!input) return;
  const val = input.value.trim();
  saveTime(week, day, val);
  const paceEl = document.getElementById(`pace-${day}`);
  if (paceEl) paceEl.textContent = getPace(val, dist);
  if (val && !getChecked(week, day)) {
    toggleChecked(week, day);
    renderWeekList();
    renderMain();
  } else {
    // update saved time display without full re-render
    const card = document.getElementById(`rc-${day}`);
    const timeSpan = card ? card.querySelector('.rc-saved-time, .rc-expand-icon') : null;
    if (timeSpan && val) { timeSpan.className = 'rc-saved-time'; timeSpan.textContent = val; }
  }
}

function previewPace(week, day, dist) {
  const input = document.getElementById(`rct-${day}`);
  const paceEl = document.getElementById(`pace-${day}`);
  if (input && paceEl) paceEl.textContent = getPace(input.value.trim(), dist);
}

function setWeek(n) {
  if (n < 1 || n > 8) return;
  activeWeek = n;
  closeDrawer();
  renderDrawerToggle();
  renderProgress();
  renderWeekList();
  renderMain();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// Init
renderTopbar();
renderProgress();
renderDrawerToggle();
renderWeekList();
renderMain();
</script>
</body>
</html>
